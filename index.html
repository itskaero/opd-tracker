<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>OPD Tracker — Pediatric</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ============ TOP NAV ============ -->
    <nav class="navbar sticky-top px-3 gh-nav">
      <div class="d-flex align-items-center gap-2">
        <svg
          height="24"
          viewBox="0 0 16 16"
          width="24"
          fill="#e6edf3"
        >
          <path
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47
            7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
            1.08.58 1.23.82.72 1.21 1.87.87
            2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
            0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
            0 0 .67-.21 2.2.82.64-.18 1.32-.27
            2-.27.68 0 1.36.09 2 .27 1.53-1.04
            2.2-.82 2.2-.82.44 1.1.16 1.92.08
            2.12.51.56.82 1.27.82 2.15 0
            3.07-1.87 3.75-3.65 3.95.29.25.54.73.54
            1.48 0 1.07-.01 1.93-.01
            2.2 0 .21.15.46.55.38A8.013 8.013 0
            0016 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
        <span class="navbar-text fw-semibold">Pediatric OPD Tracker</span>
      </div>
      <span class="navbar-text text-muted small" id="navDate"></span>
    </nav>

    <!-- ============ TAB BAR ============ -->
    <div class="gh-tab-bar">
      <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            data-bs-toggle="tab"
            data-bs-target="#tabDashboard"
            type="button"
          >
            <span class="tab-icon">📊</span> Dashboard
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tabRegister"
            type="button"
          >
            <span class="tab-icon">➕</span> Register
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tabVisit"
            type="button"
          >
            <span class="tab-icon">🩺</span> Visit
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tabSearch"
            type="button"
          >
            <span class="tab-icon">🔍</span> Search
          </button>
        </li>
      </ul>
    </div>

    <!-- ============ TAB CONTENT ============ -->
    <div class="container-fluid" style="max-width: 720px">
      <div class="tab-content px-1 py-3" id="mainTabContent">
        <!-- -------- DASHBOARD -------- -->
        <div
          class="tab-pane fade show active"
          id="tabDashboard"
          role="tabpanel"
        >
          <div class="row g-2 mb-3">
            <div class="col-6">
              <div class="gh-stat-card">
                <div class="gh-stat-value text-gh-blue" id="statTodayVisits">
                  0
                </div>
                <div class="gh-stat-label">Visits Today</div>
              </div>
            </div>
            <div class="col-6">
              <div class="gh-stat-card">
                <div class="gh-stat-value text-gh-green" id="statTotalPatients">
                  0
                </div>
                <div class="gh-stat-label">Total Patients</div>
              </div>
            </div>
            <div class="col-6">
              <div class="gh-stat-card">
                <div
                  class="gh-stat-value text-gh-orange"
                  id="statAdmissions"
                >
                  0
                </div>
                <div class="gh-stat-label">Active Admissions</div>
              </div>
            </div>
            <div class="col-6">
              <div class="gh-stat-card">
                <div
                  class="gh-stat-value text-gh-purple"
                  id="statTopComplaint"
                >
                  —
                </div>
                <div class="gh-stat-label">Top Complaint</div>
              </div>
            </div>
          </div>

          <div class="gh-section-title">
            <span class="gh-dot bg-gh-green"></span> Today's Visits
          </div>
          <div id="todayVisitsList" class="gh-list mb-3">
            <div class="gh-empty">No visits recorded today.</div>
          </div>

          <div class="gh-section-title">
            <span class="gh-dot bg-gh-orange"></span> Alerts
          </div>
          <div id="alertsList" class="gh-list mb-5">
            <div class="gh-empty">No alerts.</div>
          </div>
        </div>

        <!-- -------- REGISTER -------- -->
        <div class="tab-pane fade" id="tabRegister" role="tabpanel">
          <div class="gh-section-title mb-3">
            <span class="gh-dot bg-gh-blue"></span> Register New Patient
          </div>
          <form id="formRegister" autocomplete="off" class="gh-form">
            <div class="mb-3">
              <label class="gh-label">Patient Name *</label>
              <input
                type="text"
                class="form-control gh-input"
                id="regName"
                required
                placeholder="e.g. Ahmed Ali"
              />
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="gh-label">Date of Birth</label>
                <input
                  type="date"
                  class="form-control gh-input"
                  id="regDob"
                />
              </div>
              <div class="col-6">
                <label class="gh-label">Age (if DOB unknown)</label>
                <div class="input-group">
                  <input
                    type="number"
                    class="form-control gh-input"
                    id="regAge"
                    min="0"
                    max="18"
                    placeholder="Yrs"
                  />
                  <input
                    type="number"
                    class="form-control gh-input"
                    id="regAgeMonths"
                    min="0"
                    max="11"
                    placeholder="Mon"
                  />
                </div>
              </div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="gh-label">Gender *</label>
                <select class="form-select gh-input" id="regGender" required>
                  <option value="">Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-6">
                <label class="gh-label">Phone Number *</label>
                <input
                  type="tel"
                  class="form-control gh-input"
                  id="regPhone"
                  required
                  placeholder="03001234567"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="gh-label">Father's Name *</label>
              <input
                type="text"
                class="form-control gh-input"
                id="regFather"
                required
                placeholder="e.g. Muhammad Ali"
              />
            </div>
            <div class="mb-3">
              <label class="gh-label">Address (optional)</label>
              <input
                type="text"
                class="form-control gh-input"
                id="regAddress"
                placeholder="e.g. Mohalla XYZ, Bahawalpur"
              />
            </div>

            <div
              id="regFeedback"
              class="gh-feedback d-none"
              role="alert"
            ></div>

            <button type="submit" class="btn gh-btn-primary w-100">
              ✅ Register Patient
            </button>
          </form>
        </div>

        <!-- -------- VISIT -------- -->
        <div class="tab-pane fade" id="tabVisit" role="tabpanel">
          <div class="gh-section-title mb-2">
            <span class="gh-dot bg-gh-green"></span> New OPD Visit
          </div>

          <!-- Step 1: Select Patient -->
          <div id="visitStep1">
            <div class="input-group mb-2">
              <input
                type="text"
                class="form-control gh-input"
                id="visitPatientSearch"
                placeholder="Search patient name or phone…"
              />
              <button
                class="btn gh-btn-outline"
                type="button"
                id="btnVisitSearch"
              >
                🔍
              </button>
            </div>
            <div id="visitPatientResults" class="gh-list mb-2"></div>
          </div>

          <!-- Step 2: Visit form -->
          <div id="visitStep2" class="d-none">
            <div class="gh-patient-badge mb-2">
              <span id="visitPatientBadge"></span>
              <button
                class="btn btn-sm gh-btn-outline"
                id="btnChangePatient"
              >
                Change
              </button>
            </div>

            <div
              id="weightAlertBanner"
              class="gh-banner-warning d-none"
            ></div>

            <form id="formVisit" autocomplete="off" class="gh-form">
              <input type="hidden" id="visitPatientId" />

              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="gh-label">Visit Date</label>
                  <input
                    type="date"
                    class="form-control gh-input"
                    id="visitDate"
                  />
                </div>
                <div class="col-6">
                  <label class="gh-label">Weight (kg) *</label>
                  <input
                    type="number"
                    class="form-control gh-input"
                    id="visitWeight"
                    step="0.1"
                    min="0.5"
                    max="150"
                    required
                    placeholder="e.g. 12.5"
                  />
                </div>
              </div>

              <!-- Quick Complaint Buttons -->
              <label class="gh-label">Chief Complaint *</label>
              <div class="d-flex flex-wrap gap-2 mb-2" id="quickComplaints">
                <button
                  type="button"
                  class="gh-chip"
                  data-val="Fever"
                >
                  🌡️ Fever
                </button>
                <button
                  type="button"
                  class="gh-chip"
                  data-val="Cough"
                >
                  😷 Cough
                </button>
                <button
                  type="button"
                  class="gh-chip"
                  data-val="Diarrhea"
                >
                  💧 Diarrhea
                </button>
                <button
                  type="button"
                  class="gh-chip"
                  data-val="Vomiting"
                >
                  🤮 Vomiting
                </button>
                <button
                  type="button"
                  class="gh-chip"
                  data-val="Rash"
                >
                  🔴 Rash
                </button>
                <button
                  type="button"
                  class="gh-chip"
                  data-val="Breathing difficulty"
                >
                  😮‍💨 Breathing
                </button>
              </div>
              <input
                type="text"
                class="form-control gh-input mb-3"
                id="visitComplaint"
                required
                placeholder="or type complaint here…"
              />

              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="gh-label">Duration of Illness</label>
                  <input
                    type="text"
                    class="form-control gh-input"
                    id="visitDuration"
                    placeholder="e.g. 3 days"
                  />
                </div>
                <div class="col-6">
                  <label class="gh-label">Diagnosis</label>
                  <input
                    type="text"
                    class="form-control gh-input"
                    id="visitDiagnosis"
                    placeholder="e.g. URTI"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="gh-label">Treatment Given</label>
                <textarea
                  class="form-control gh-input"
                  id="visitTreatment"
                  rows="2"
                  placeholder="Rx details…"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="gh-label">Follow-up Advice</label>
                <input
                  type="text"
                  class="form-control gh-input"
                  id="visitFollowup"
                  placeholder="e.g. Follow up in 3 days"
                />
              </div>

              <!-- Admission toggle -->
              <div class="gh-toggle mb-3">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="visitAdmitted"
                />
                <label class="form-check-label" for="visitAdmitted">
                  🏥 Admit this patient
                </label>
              </div>

              <div id="admissionFields" class="gh-admission-box d-none">
                <div class="row g-2">
                  <div class="col-6">
                    <label class="gh-label">Admission Date</label>
                    <input
                      type="date"
                      class="form-control gh-input"
                      id="admDate"
                    />
                  </div>
                  <div class="col-6">
                    <label class="gh-label">Outcome</label>
                    <select class="form-select gh-input" id="admOutcome">
                      <option value="Admitted">Admitted (pending)</option>
                      <option value="Discharged">Discharged</option>
                      <option value="LAMA">LAMA</option>
                      <option value="Expired">Expired</option>
                    </select>
                  </div>
                </div>
                <div class="mt-2">
                  <label class="gh-label">Admission Diagnosis</label>
                  <input
                    type="text"
                    class="form-control gh-input"
                    id="admDiagnosis"
                    placeholder="Admission diagnosis"
                  />
                </div>
              </div>

              <div
                id="visitFeedback"
                class="gh-feedback d-none"
                role="alert"
              ></div>

              <button type="submit" class="btn gh-btn-green w-100 mb-5">
                💾 Save Visit
              </button>
            </form>
          </div>
        </div>

        <!-- -------- SEARCH / PATIENT HISTORY -------- -->
        <div class="tab-pane fade" id="tabSearch" role="tabpanel">
          <div class="gh-section-title mb-2">
            <span class="gh-dot bg-gh-blue"></span> Search Patients
          </div>
          <div class="input-group mb-2">
            <input
              type="text"
              class="form-control gh-input"
              id="searchInput"
              placeholder="Name or phone number…"
            />
            <button
              class="btn gh-btn-primary"
              type="button"
              id="btnSearch"
            >
              🔍
            </button>
          </div>
          <div id="searchResults" class="gh-list mb-3"></div>

          <!-- Patient detail card -->
          <div id="patientDetail" class="d-none">
            <div class="gh-detail-card mb-3">
              <div class="gh-detail-header">
                <h6 class="mb-0" id="detailName"></h6>
              </div>
              <div class="gh-detail-body">
                <div class="text-muted small" id="detailMeta"></div>
                <div class="small" id="detailPhone"></div>
              </div>
            </div>

            <!-- Weight Trend -->
            <div class="gh-section-title">
              <span class="gh-dot bg-gh-purple"></span> Weight Trend
              <span class="text-muted small">(last 3 visits)</span>
            </div>
            <div class="d-flex gap-2 mb-3" id="weightTrend"></div>

            <!-- Visit History -->
            <div class="gh-section-title">
              <span class="gh-dot bg-gh-green"></span> Visit History
              <span class="text-muted small">(last 5)</span>
            </div>
            <div id="visitHistory" class="mb-5"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
